name: c2pa_audio
description: >-
  Dart FFI bindings to sign and verify C2PA (Content Credentials) in WAV and MP3
  audio — ES256/CBOR/JUMBF/COSE, no c2pa-rs. Interoperable with c2pa-rs.
version: 0.1.0
repository: https://github.com/CrispStrobe/c2pa-audio/tree/main/bindings/dart
homepage: https://github.com/CrispStrobe/c2pa-audio
environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  ffi: ^2.1.0
dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
topics:
  - c2pa
  - provenance
  - audio
  - ffi
  - content-credentials
