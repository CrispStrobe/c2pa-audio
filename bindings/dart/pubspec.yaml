name: c2pa_audio
description: >-
  Native C2PA (Content Credentials) signing and verification for WAV audio via
  FFI — ES256 / CBOR / JUMBF / COSE, no c2pa-rs. Interoperable with the c2pa-rs
  reference implementation.
version: 0.1.0
repository: https://github.com/CrispStrobe/c2pa-audio
environment:
  sdk: ^3.4.0
dependencies:
  ffi: ^2.1.0
dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
